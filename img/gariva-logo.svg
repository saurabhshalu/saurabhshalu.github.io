<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="240 140 320 320"
     width="100%"
     style="display: block; cursor: pointer;"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-label="Gariva Logo">

  <style>
    svg {
      --color-g: #1e293b;
      --color-gear: #5ba4a4;
    }
    @media (prefers-color-scheme: dark) {
      svg {
        --color-g: #1e293b;
        --color-gear: #5ba4a4;
      }
    }
    :root.dark svg, .dark svg {
      --color-g: #1e293b !important;
      --color-gear: #5ba4a4 !important;
    }
    :root.light svg, .light svg {
      --color-g: #1e293b !important;
      --color-gear: #5ba4a4 !important;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .gear-wrapper {
      transform-box: fill-box;
      transform-origin: center;
      transform: scale(1.3); 
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .gear-inner {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin 8s linear infinite;
    }

    svg:hover .gear-inner { 
      animation-duration: 2s; 
    }

    svg:hover .gear-wrapper { 
      transform: scale(1.5); 
    }

    @media (prefers-reduced-motion: reduce) {
      .gear-inner { 
        animation: none; 
      }
      .gear-wrapper { 
        transform: scale(1.3) !important; 
      }
    }
  </style>

  <path d="M 460,240 L 400,180 L 280,300 L 280,420 L 520,420 L 520,340 L 400,340"
        fill="none"
        stroke="var(--color-g)"
        stroke-width="40"
        stroke-linecap="round"
        stroke-linejoin="round" />

  <g class="gear-wrapper">
    <g class="gear-inner">
      <circle cx="400" cy="340" r="31"
              fill="none"
              stroke="var(--color-gear)"
              stroke-width="14"
              stroke-linecap="butt"
              stroke-dasharray="12.17 12.17" />
      <circle cx="400" cy="340" r="24" fill="var(--color-gear)" />
      <circle cx="400" cy="340" r="8" fill="var(--color-g)" />
    </g>
  </g>
</svg>